# --- Global Prefix ---
unbind-key C-b
set -g prefix C-f
bind-key C-f send-prefix

# --- General options ---
set-option -g default-shell /bin/zsh
set -g default-terminal "screen-256color"
set -g history-limit 30000
set -g renumber-windows on
set -sg escape-time 0
set -g mouse on
set -g allow-rename off
set -g mode-keys vi

# Styles
set -g message-style "fg=colour232,bg=colour208,bold"
setw -g window-status-current-style "fg=colour81,bg=colour238,bold"
setw -g window-status-style "fg=colour248,bg=colour235,none"

# --- Clipboard (macOS) ---
set -g set-clipboard off
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Window / Pane numbering ---
set -g base-index 1
setw -g pane-base-index 1

# --- Directory Logic ---
# New PANES: Open in CURRENT directory
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"

# New WINDOWS: Open in SESSION START directory and prompt for name
bind-key c command-prompt -p "Window name:" "new-window -c '#{session_path}' -n '%%'"

# Navigation
bind-key 1 select-window -t 1
bind-key 2 select-window -t 2
bind-key 3 select-window -t 3
bind-key 4 select-window -t 4
bind-key 5 select-window -t 5
bind-key 6 select-window -t 6
bind-key 7 select-window -t 7
bind-key 8 select-window -t 8
bind-key 9 select-window -t 9

# --- Status Line ---
set -g status-justify centre
set -g status-bg colour234
set -g status-fg colour135
set -g status-left "#[fg=colour233,bg=colour244,bold] #h :: #S "
set -g status-right "#[fg=colour233,bg=colour244,bold] %d %b %Y :: %l:%M %p "

# --- Hooks ---
# Prompt to rename the initial window when a session starts
set-hook -g after-new-session 'command-prompt -p "Name for initial window:" "rename-window '%%'"'

# Shortcut to reload config file
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"
